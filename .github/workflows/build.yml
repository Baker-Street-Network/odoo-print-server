name: Build & Release OdooPrintServer

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    env:
      PROJECT_PATH: OdooPrintServer.csproj
      RUNTIME: win-x64
      PUBLISH_DIR: publish
      ZIP_NAME: OdooPrintServer-win-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # we need full history to count commits

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore $env:PROJECT_PATH
        shell: pwsh

      - name: Build (Release)
        run: dotnet build $env:PROJECT_PATH -c Release --no-restore
        shell: pwsh

      - name: Publish (win-x64)
        run: |
          dotnet publish $env:PROJECT_PATH -c Release -r $env:RUNTIME -o $env:PUBLISH_DIR `
            --self-contained false `
            -p:IncludeAllContentForSelfExtract=true `
            -p:PublishTrimmed=false
        shell: pwsh

      - name: Zip publish output
        run: |
          if (Test-Path $env:ZIP_NAME) { Remove-Item $env:ZIP_NAME -Force }
          Compress-Archive -Path "$env:PUBLISH_DIR\*" -DestinationPath $env:ZIP_NAME
        shell: pwsh

      - name: Compute commit count version
        id: meta
        run: |
          $count = (git rev-list --count HEAD).Trim()
          "VERSION=1.0.$count" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding UTF8
        shell: pwsh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.ZIP_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (for debugging / CI traceability)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.VERSION }}-zip
          path: ${{ env.ZIP_NAME }}
